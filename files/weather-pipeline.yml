name: Weather Data Pipeline

# Spouští se automaticky každou hodinu, nebo manuálně z GitHub UI (tlačítko "Run workflow").
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

# Potřebné, aby workflow mohl commitnout aktualizovanou databázi zpět do repozitáře.
permissions:
  contents: write

# Zabrání souběhu dvou běhů najednou (např. plánovaný + manuální) - obojí by se
# jinak mohlo pokusit commitnout/pushnout ve stejnou chvíli a kolidovat.
concurrency:
  group: weather-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastavení Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalace závislostí
        run: pip install -r requirements.txt

      - name: Spuštění pipeline
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CITY_NAME: Litomerice
          LATITUDE: "50.5341"
          LONGITUDE: "14.1310"
        run: python pipeline.py

      - name: Commit aktualizované databáze zpět do repozitáře
        run: |
          git config user.name "weather-pipeline-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f data/weather.db
          git diff --staged --quiet || git commit -m "Aktualizace dat o počasí"
          git push
